name: CI - Build Check

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libgl-dev \
            libglew-dev \
            libglfw3-dev \
            libglm-dev \
            freeglut3-dev \
            libeigen3-dev \
            cmake \
            build-essential

      - name: Configure CMake
        run: cmake -B Cpp/build -S Cpp

      - name: Build
        run: cmake --build Cpp/build
